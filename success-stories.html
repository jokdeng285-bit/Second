<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Success Stories — Spark Dating</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💘</text></svg>"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="css/style.css" rel="stylesheet"/>
  <style>
    .reveal { opacity:0; transform:translateY(24px); transition:opacity .6s ease,transform .6s ease; }
    .reveal.revealed { opacity:1; transform:none; }
    .story-card {
      background: var(--plum-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      transition: transform .25s, box-shadow .25s;
    }
    .story-card:hover { transform:translateY(-6px); box-shadow:0 20px 60px rgba(155,93,229,0.2); }
    .story-banner {
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      gap: 1rem;
      background: linear-gradient(135deg, rgba(255,61,120,0.2), rgba(155,93,229,0.2));
      border-bottom: 1px solid var(--border);
    }
    .story-banner img { width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid var(--rose); }
    .match-date { font-size:.75rem; color:var(--text-muted); letter-spacing:1px; }
