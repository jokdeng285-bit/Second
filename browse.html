  <style>
    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 50px;
      padding: .4rem 1.1rem;
      font-size: .85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      font-family: 'Inter', sans-serif;
    }
    .filter-btn:hover, .filter-btn.active {
      background: linear-gradient(135deg, var(--rose), var(--violet));
      color: #fff;
      border-color: transparent;
    }
    .search-wrap { position: relative; }
    .search-wrap i { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:.9rem; }
    #profile-search { padding-left: 2.5rem; }
    .profile-actions { display:flex; gap:.5rem; padding:.75rem 1rem; border-top:1px solid var(--border); }
    .action-btn { flex:1; border:none; border-radius:8px; padding:.5rem; font-size:.9rem; cursor:pointer; transition:all .2s; }
    .action-like { background:rgba(255,61,120,0.12); color:var(--rose); }
    .action-like:hover { background:var(--rose); color:#fff; }
    .action-msg { background:rgba(155,93,229,0.12); color:var(--violet); }
    .action-msg:hover { background:var(--violet); color:#fff; }
  </style>
</head>
